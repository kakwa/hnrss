replicaCount: 2

image:
  repository: registry.int.kakwalab.ovh/hnrss
  tag: latest
  pullPolicy: Always

registryAuth:
  create: true
  server: registry.int.kakwalab.ovh
  username: registry
  password: false

service:
  port: 80
  targetPort: 9000

ingress:
  enabled: false
  host: ""
  className: traefik
  # Traefik → pod when the app serves HTTPS with a cert the cluster does not trust.
  upstreamScheme: http
  upstreamInsecureSkipVerify: true
