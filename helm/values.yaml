replicaCount: 2

image:
  repository: registry.int.kakwalab.ovh/hnrss
  tag: latest
  pullPolicy: Always

registryAuth:
  secretName: "registry-secret"
  create: true
  server: registry.int.kakwalab.ovh
  username: registry

service:
  port: 80
  targetPort: 9000

ingress:
  enabled: true
  host: hnrss.int.kakwalab.ovh
  className: traefik
  # Traefik → pod when the app serves HTTPS with a cert the cluster does not trust.
  upstreamScheme: http
  upstreamInsecureSkipVerify: true
