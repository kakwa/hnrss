{{- if .Values.registryAuth.create }}
{{- if not .Values.registryAuth.password }}
{{- fail "hnrss: registryAuth.create requires registryAuth.password (nginx basic-auth for registry.int.kakwalab.ovh)" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.registryAuth.secretName | quote }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ include "hnrss.dockerconfigjson" . | b64enc }}
{{- end }}
