{{- if .Values.registryAuth.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-registry
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.registryAuth.server .Values.registryAuth.username .Values.registryAuth.password (printf "%s:%s" .Values.registryAuth.username .Values.registryAuth.password | b64enc) | b64enc }}
{{- end }}
